<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vokabeltrainer</title>

<style>
body { font-family: Arial; background:#f5f5f5; padding:15px; }
.card { background:white; padding:15px; border-radius:10px; margin-bottom:15px; }
button { padding:12px; margin:5px; font-size:16px; }
.question { font-size:26px; text-align:center; margin:20px 0; }
.answer { font-size:22px; text-align:center; margin-top:10px; }
.hidden { display:none; }
</style>
</head>

<body>

<div class="card">
<h3>Einstellungen</h3>

<select id="direction">
<option value="de-es">Deutsch → Spanisch</option>
<option value="es-de">Spanisch → Deutsch</option>
</select>

<select id="category"></select>

<label>
<input type="checkbox" id="onlyDifficult"> Nur schwierige Wörter
</label>

<br><br>
<button id="nextBtn">Weiter</button>
</div>

<div class="card">
<h3>Lernkarte</h3>

<div class="question" id="question">Start drücken</div>

<div id="solutionArea" class="hidden">
<div class="answer" id="answer"></div>
<p id="notes"></p>

<button onclick="changeLevel(-1)">- leichter</button>
<button onclick="changeLevel(1)">+ schwieriger</button>
</div>

<p>Stufe: <span id="level">-</span></p>
</div>

<div class="card">
<h3>Daten importieren</h3>
<input type="file" id="importFile" accept="*/*">
</div>

<script>

const KATEGORIEN_MAP = {
  1: "Verben",
  2: "Substantive",
  3: "Adjektive",
  4: "Redewendungen",
  5: "Diverses",
  6: "Sätze"
};

let words = [];
let current = null;
let showingSolution = false;

document.getElementById("importFile").addEventListener("change", function(e){
    const file = e.target.files[0];
    const reader = new FileReader();
    reader.onload = function(){
        words = parseCSV(reader.result);
        populateCategories();
        alert("Import erfolgreich!");
    };
    reader.readAsText(file);
});

function parseCSV(text){
    let lines = text.split("\n").filter(l=>l.trim()!="");
    let headers = lines[0].split(";");

    return lines.slice(1).map((line,i)=>{
        let cols = line.split(";");

        return {
            Nummer: i+1,
            Deutsch: cols[1],
            Spanisch: cols[2],
            Kategorie: KATEGORIEN_MAP[Number(cols[3])] || cols[3],
            Zaehler: Number(cols[4] || 1),
            Bemerkungen: cols[5] || ""
        };
    });
}

function populateCategories(){
    let sel = document.getElementById("category");
    sel.innerHTML = "<option value=''>Alle</option>";

    let cats = [...new Set(words.map(w=>w.Kategorie))];

    cats.forEach(c=>{
        let opt = document.createElement("option");
        opt.value = c;
        opt.textContent = c;
        sel.appendChild(opt);
    });
}

function weight(z){
    if(z==1) return 1;
    if(z==2) return 2;
    if(z==3) return 4;
}

function getFiltered(){
    let cat = document.getElementById("category").value;
    let only = document.getElementById("onlyDifficult").checked;

    return words.filter(w=>{
        if(cat && w.Kategorie!=cat) return false;
        if(only && w.Zaehler<2) return false;
        return true;
    });
}

function nextWord(){
    let list = getFiltered();
    if(list.length==0){ alert("Keine Wörter"); return; }

    let total = list.reduce((s,w)=>s+weight(w.Zaehler),0);
    let r = Math.random()*total;

    let sum = 0;
    for(let w of list){
        sum += weight(w.Zaehler);
        if(r<=sum){ current=w; break; }
    }

    document.getElementById("solutionArea").classList.add("hidden");
    document.getElementById("question").textContent =
        document.getElementById("direction").value=="de-es" ? current.Deutsch : current.Spanisch;

    document.getElementById("level").textContent = current.Zaehler;
    showingSolution = false;
    document.getElementById("nextBtn").textContent = "Lösung anzeigen";
}

function showSolution(){
    document.getElementById("solutionArea").classList.remove("hidden");

    document.getElementById("answer").textContent =
        document.getElementById("direction").value=="de-es" ? current.Spanisch : current.Deutsch;

    document.getElementById("notes").textContent = current.Bemerkungen || "";
    showingSolution = true;
    document.getElementById("nextBtn").textContent = "Weiter";
}

document.getElementById("nextBtn").addEventListener("click", ()=>{
    if(!current || showingSolution){
        nextWord();
    } else {
        showSolution();
    }
});

function changeLevel(d){
    if(!current)return;

    current.Zaehler=Math.min(3,Math.max(1,current.Zaehler+d));
    document.getElementById("level").textContent=current.Zaehler;
}

</script>

</body>
</html>
